<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>System Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: black;
            color: #00ff66;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        body.warning {
            color: #ff3333;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.85;
            }

            100% {
                opacity: 1;
            }
        }
        

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #terminal {
            width: 100%;
            height: 100%;
            padding: 20px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            background: #00ff66;
            margin-left: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            50% {
                opacity: 1;
            }

            51%,
            100% {
                opacity: 0;
            }
        }

        #exitHint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #006633;
            opacity: 0;
        }

        #reveal {
            position: fixed;
            inset: 0;
            background: black;
            color: #00ff66;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="terminal"></div>
    <div id="exitHint"></div>
    <div id="reveal"> your system is now in under control of `Sharma Cyber Group`</div>

    <script>
        const terminal = document.getElementById('terminal');
        const reveal = document.getElementById('reveal');
        const exitHint = document.getElementById('exitHint');

        const preLines = [
            'root@kali:~# nmap -A -p 22,80,443 192.168.1.45',
            'Starting Nmap 7.94 ( https://nmap.org )',
            'Network Distance: 1 hop',
            '',
            'root@kali:~# whois target.local',
            '[+] Last Updated: 2025-11-02',
            'root@kali:~# sqlmap -u "http://target.local/login.php" --batch',
            '',
            'root@kali:~# hydra -l admin -P rockyou.txt ssh://192.168.1.45',
            '[STATUS] attack finished successfully',
            '',
            'root@kali:~# ssh admin@192.168.1.45',
            'admin@target:~$ id',
            'uid=1000(admin) gid=1000(admin) groups=1000(admin),27(sudo)',
            '',
            'admin@target:~$ sudo -i',

            '*** WARNING: ROOT ACCESS GRANTED ***'
        ];

        const generatedLines = [
            '[!] permission denied — retrying...',
            '[✔] permission granted',
            'initializing secure connection...',
            'connecting to device...',
            'connection timeout — retrying...',
            'device handshake successful.',
            'bypassing firewall rules...',
            'decrypting security tokens...',
            'accessing system core...',
            '',
            'SYSTEM ACCESS: CONFIRMED',
            'CPU usage: 78%',
            'Memory usage: 6.2GB / 8GB',
            'reading system files...',
            'scanning local storage...',
            'collecting metadata...',
            'collecting credentials cache...',
            'uploading data chunk [1/3]...',
            'upload failed — retrying...',
            'uploading data chunk [2/3]...',
            'uploading data chunk [3/3]...',
            'upload complete.',
            '',
            'PROCESS COMPLETE.'
        ];

        const lines = [...preLines, '', ...generatedLines];

        let lineIndex = 0;
        let charIndex = 0;

        function typeLine() {
            if (lines[lineIndex]?.includes('ROOT ACCESS GRANTED')) {
                document.body.classList.add('warning');
            }
            if (lineIndex >= lines.length) {
                exitHint.style.opacity = 1;
                return;
            }

            const line = lines[lineIndex];
            if (charIndex < line.length) {
                terminal.innerHTML += line.charAt(charIndex);
                charIndex++;
                setTimeout(typeLine, 30);
            } else {
                terminal.innerHTML += '\n';
                charIndex = 0;
                lineIndex++;
                const isGenerated = lineIndex >= preLines.length;
                const delay = isGenerated
                    ? Math.floor(Math.random() * 4000) + 3000
                    : 400;
                setTimeout(typeLine, delay);
            }
        }

        // Start typing after short delay
        setTimeout(typeLine, 800);

        // Fake fullscreen attempt
        document.documentElement.requestFullscreen?.();

        // Exit on long press
        let pressTimer;

        document.addEventListener('touchstart', () => {
            pressTimer = setTimeout(endPrank, 13000);
        });

        document.addEventListener('touchend', () => {
            clearTimeout(pressTimer);
        });

        function endPrank() {
            document.body.classList.remove('warning');
            reveal.style.display = 'flex';
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        }
    </script>
</body>

</html>
