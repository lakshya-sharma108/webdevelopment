<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        .container{
            width: 60vw;
            height: 40vh;
            background-color: beige;
            margin-left: 20px;
            margin-top: 20px;
            text-align: center;
            /* padding-top: 20px; */
            border-radius: 10px;
            border: 2px solid lightgray;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .box{
            width: 90%;
            height: 20%;
            text-align: center;
            padding: 10px;
            border: 2px solid lightgray;
            border-radius: 5px;
            background-color: aliceblue;
        }

        .container #btn{
            width: 90px;
            height: 35px;
            margin-top: 10px;
            font-size: 16px;
            border: 1.5px solid gray;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">Hey, i am a box</div>
        <button id="btn">click here</button>
    </div>




    <script src="./12practice.js"></script>
</body>
</html>
