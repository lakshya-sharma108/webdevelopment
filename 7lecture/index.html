<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>semantic tags</title>
</head>
<body>

    <!-- 
        Semantic Tags in HTML (Simple & In-Depth Explanation)
            1. What are Semantic Tags?
            Semantic tags in HTML clearly define the meaning of the content they hold. They help browsers, developers, and search engines understand the structure of a webpage better than generic <div> or <span> elements.

            For example:
            ✔ Semantic Tag: <header> → Clearly means the header section of a page.
            ❌ Non-Semantic Tag: <div class="header"> → Does not clearly define meaning.

                
        2. Why Use Semantic Tags?
            ✔ Improves Readability – Code becomes easy to understand.
            ✔ Better SEO (Search Engine Optimization) – Helps search engines index pages effectively.
            ✔ Accessibility – Assistive technologies (like screen readers) understand the page structure better.
            ✔ Standardized Structure – Follows best web development practices.
            ✔ Semantic tags make HTML more readable & structured.
            ✔ Use <header>, <nav>, <main>, <article>, <section>, <footer>, etc., instead of generic <div>.


            Common Semantic Tags & Their Uses:-
            Tag	             Purpose	                                     Example
            <header>	     Defines the header section of a webpage	     Website logo, navigation menu
            <nav>	         Defines navigation links	                     Menus, links to different sections
            <main>	         Contains the main content of the page	         Articles, blog posts, product details
            <section>	     Defines a section of content	                 Different topics in a blog post
            <article>	     Represents self-contained content	             Blog post, news article, forum post
            <aside>	         Defines side content	                         Ads, related links, author bio
            <footer>	     Defines the footer section	                     Copyright, contact info, social links
            <figure>	     Groups an image with a caption	                 Image with a description
            <figcaption>	 Adds a caption to <figure>	                     Text under an image
            <mark>	         Highlights important text	                     Important words in an article
            <time>	         Represents date/time	                         Publish date of an article
    -->

    <header>
        <nav>
            <ul>
                <li>Home</li>
                <li>About</li>
                <li>Contact</li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Difference b/w semantic and non-semantic tags</h2>

        <img src="semantic and non-semantic.png" alt="semantic and non-semantic" height="400px">

    </main>

    <footer> &copy; copyright lakshaya.com | All rights reserved</footer>

</body>
</html>
