<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosition Properties Practice</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }

        .parent{
            height: 1000px;
            width: 1200px;
            border: 2px solid black;
            background-color: rgb(35, 149, 111); 
            border-radius: 25px;
            position: relative;
            top: 60px;
            left: 100px;
        }

        .box{
            height: 100px;
            width: 200px;
            border: 2px solid black;

            /* By default the position of an element is static which doesn't allow to use top, bottom, left, right properties */
            position: relative;
            top: 15px;
            left: 25px;
            display: inline-block;
            border-radius: 20px;

            font-size: 25px;
            text-align: center;
            line-height: 100px;
            font-weight: bold;
        }

        #child1-1{
            background-color: rgb(235, 119, 31);

            /* Changing the position to absolute allows to use top, bottom, left, right and z-index properties */
            position: absolute;
            top: 0px;
            left: 0px;

            /* If an element is positioned absolute then :
            1. It is positioned relative to its nearest positioned ancestor instead of positioned relative to the viewport.
            2. If an absolute positioned element has no positioned ancestors, it uses the document body, and moves along with page scrolling */
               
        }

        #child1-2{
            background-color: rgb(0, 225, 255);

            /* In simple words, position fixed means to fix the position of an element relative to the viewport, which means it always stays in the same place even if the page is scrolled. The top, right, bottom, and left properties are used to position the element */
            position: fixed;
            top: 50%;
            left: 20%;
        }

        #child1-3{
            background-color: rgb(136, 0, 255);

            position: sticky;
            /* top: 10%; */
            left: 35%;
        }

        #child1-4{
            background-color: rgb(255, 0, 110);

            position: sticky;
            
            left: 50%;
            margin: 60px;
        }

    </style>
    
</head>
<body>
    <div class="parent">
        <div id="child1-1" class="box">Box-1</div>
        <div id="child1-2" class="box">Box-2</div>
        <div id="child1-3" class="box">Box-3</div>
        <div id="child1-4" class="box">Box-4</div>
    </div>
</body>
</html>
