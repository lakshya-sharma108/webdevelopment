<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Sizing Units</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }


        .box{
            border: 2px solid black;
            width: 1920px;
            background-color: aquamarine;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="box">
        This is a box
    </div>
    
</body>
</html>
