<body>
    <!-- 
        What is Transition?
        Moving very smoothly from one state to another.
        hindi:
        Ek jagah se dusri jagah bahut aaram se jana



        Key Properties of Transition
        There are four main properties:

        transition-property
        Tells the browser what CSS property should animate.
        Example: color, background-color, width, transform, etc.

        transition-duration
        How long the animation should take.
        Example: 2s (2 seconds), 500ms (half a second).

        transition-timing-function
        The speed curve of the animation (how it accelerates or decelerates).
        Common values:
        ease → default, starts slow, speeds up, then slows down.
        linear → constant speed.
        ease-in → starts slow, then speeds up.
        ease-out → starts fast, slows at the end.
        ease-in-out → slow → fast → slow.

        transition-delay
        Time to wait before starting the transition.
        Example: 1s → waits 1 second, then animates.

        Shorthand:
        transition: property duration timing-function delay;
    -->

    <div class="container">
        <div class="box translate"></div>
    </div>
</body>
