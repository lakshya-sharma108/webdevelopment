<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Filters</title>
    <style>
        /* img{
            filter: blur(10px);
        } */

        .img1{
            height: 50vh;
            
            /* filter: brightness(150%) contrast(150%); */
            filter: opacity(0.5);
        }

        .img2{
            height: 50vh;

            /* filter: grayscale(50%); */
            filter: sepia(50%);
        }

        .img3{
            height: 50vh;
            filter: invert(100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="img1" src="/27lecture/lucky.png" alt="">
