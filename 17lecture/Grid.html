<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Concept</title>
    <style>
        .box{
            /* height: 200px; */
            background-color: cadetblue;
            border: 2px solid beige;
        }

        .container{
            background-color: brown;

            /* This property converts the container into grid */
            display: grid;


            /* This property defines the no. of columns in a row and 
               size of each column */
            /* grid-template-columns: 100px 50px 200px 300px 100px; */

            /* giving width in fraction helps cover whole width */
            grid-template-columns: 1fr 2fr  3fr 4fr;

            /* This property defines the size of each row */
            grid-template-rows: 50px 300px 100px;

        }
    </style>
</head>

<body>
    <div class="container">
        <div id="box-1" class="box">item-1</div>
        <div id="box-2" class="box">item-2</div>
        <div id="box-3" class="box">item-3</div>
        <div id="box-4" class="box">item-4</div>
        <div id="box-5" class="box">item-5</div>
        <div id="box-6" class="box">item-6</div>
        <div id="box-7" class="box">item-7</div>
        <div id="box-8" class="box">item-8</div>
        <div id="box-9" class="box">item-9</div>
        <div id="box-10" class="box">item-10</div>
    </div>
</body>

</html>
