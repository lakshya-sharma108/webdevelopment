<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        

        /* Parent Box Properties */
        #container{
            background-color: brown;
            height: 750px;



            /* display-flex will make all the child elements flex items, 
            and arrange them in a row */
            display: flex;


            /* "justify-content"  <-- Supporting properties */
            /* 1. All items move to the center of the parent element */
            justify-content: center; 

            /* 2. All items move to the start of the parent element */
            /* justify-content: flex-start; */

            /* 3. All items move to the end of the parent element */
            /* justify-content: flex-end; */

            /* 4. First item at the start, last item at the end, even spacing between items */
            /* justify-content: space-between; */

            /* 5. Equal space around all items */
            /* justify-content: space-around; */

            /* 6. Equal space evereywhere */
            /* justify-content: space-evenly; */



            /* Align-item property will work vertically on you elements 
            Default value of align item is stretch*/
            /* 1. Items stretch to fill the containers height */
            /* align-items: stretch; */

            /* 2. Items move to the center vertically */
            align-items: center;

            /* 3. Items stick to the top of the container */
            /* align-items: flex-start; */

            /* 4. Items stick to the bottom the container */
            /* align-items: flex-end; */



            /* the flex wrap property tells the browser whether the flex items should stay in one line or wrap onto multiple lines if there's no space -- unlike display-flex, in flex wrap width of child elements works properly */
            flex-wrap: wrap;



            /* Gap property simply adds space between flex or grid items -- this is totally different from margin */
            gap: 10px;
            /* row-gap: 20px; */
            /* column-gap: 20px; */



            /* flex direction property is used to reverse the flow of justify content and align item also it is used to reverse the direction of rows and columns */
            /* flex-direction: row; */
            /* flex-direction: column; */
            /* flex-direction: row-reverse; */
            /* flex-direction: column-reverse; */



            /* Align-content */
            /* align-content: center; */

        }




        /* Child elements properties */
        .box{
            /* height: 200px; */
            background-color: cadetblue;
            border: 2px dashed black;
            width: 100px;
            /* display: inline-block; */

        }




        /* Particular child element properties */
        #item-3{

            /* 1. Align self -- moves a particular element according to given value */
            align-self: baseline;

            /* 2. Order -- Arranges the element according to given order
                shift the highest order element in the last */
            order: 1;

        }
    </style>
</head>
<body>
    <div id="container">
        <div id="item-1" class="box">item-1</div>
        <div id="item-2" class="box">item-2</div>
        <div id="item-3" class="box">item-3</div>
        <div id="item-4" class="box">item-4</div>
        <div id="item-5" class="box">item-5</div>
        <div id="item-6" class="box">item-6</div>
        <div id="item-7" class="box">item-7</div>
        <div id="item-8" class="box">item-8</div>
        <div id="item-9" class="box">item-9</div>
        <div id="item-10" class="box">item-10</div>
    </div>
</body>
</html>
