<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Property Practice</title>
    <!-- <link rel="stylesheet" href="Practice8.css"> -->
     <style>
        *{
            margin: 0;
            padding: 0;
        }

        .box1{
            background-color: aqua;
            
            /* Position of an element is by default static which dosen't allow to use top, bottom, left, right properties */
            top: 30px;
            left: 50px;
        }
        .box2{
            background-color: rgb(203, 221, 221);

            /* Changing the position to relative allows to use top, bottom, left, right and z-index properties */
            position: relative;
            top: 30px;
            left: 50px;
        }
        .box3{
            background-color: antiquewhite;
        }
        .box4{
            background-color: purple;
        }

        .box{
            height: 133px;
            width: 50%;
            border: 2px solid black;
            padding: 3px;
            margin: 3px;
        }

        .parent{
            padding: 43px;
            margin: 34px;
            border: 2px solid purple;
            
        }

     </style>
</head>
<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>
</html>
