<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        /* Inline CSS */
        h2{
            color: rgb(26, 84, 65);
            /* font-size: 50px; */
        }

        #TestCss{
            color:sandybrown;
        }


    </style>
    <link rel="stylesheet" href="Styles.css">
</head>
<body>

    <!-- Example of Inline CSS -->
    <h1 style="color: blueviolet;">Inline CSS Practice</h1>

    <h2>Internal CSS Practice</h2>

    <h3>External CSS Practice</h3>


    <!-- Checking css applying prioritoy -->
     <h1 id="TestCss" style="color: rgb(38, 98, 147);">Hi, my name is Lakshaya Awasthi</h1>
     <!-- 
            Priority of CSS 
            1. Inline CSS (Highest Priority)
            2. Internal CSS
            3. External CSS (Lowest Priority)
            Note: If there are conflicting styles, the one with higher priority will be applied.
            "closer style has more priority"
     -->

</body>
</html>
