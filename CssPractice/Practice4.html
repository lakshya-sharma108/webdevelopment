<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-model</title>
    <link rel="stylesheet" href="Practice4.css">
    <style>
        *{
            /* This universial selector will apply on all content */
            /* margin: 0;
            padding: 0; */
        }

        h1 {
            border: 5px solid black;
            text-align: center;
            color: darkorange;
            background-color: rgb(83, 80, 80);

            /*  Padding: Space between content and border
                Padding can have 1, 2, 3 or 4 values
                padding-left: 500px;
                padding-top: 200px;
                padding-bottom: 200px;
             */
            padding: 60px;


            /*  Margin: Space between border and other elements  
                Margin can have 1, 2, 3 or 4 values
                margin-left: 500px;
                margin-top: 200px;
                margin-bottom: 200px;
             */
            margin: 100px;
            
        }


        .box {
            height: 400px;
            width: 400px;
            border: 10px solid black;
            background-color: lightskyblue;

            /* padding: 25px; */
            /* For induvidual padding -- and all in one line */
            padding: 25px 20px 15px 10px; /* top right bottom left */


            /* margin: 25px; */
            /* For induvidual margin -- and all in one line */
            margin: 25px 20px 15px 10px; /* top right bottom left */
            
        }
    </style>
</head>
<body>
    <h1>Box Model</h1>

    <div class="box">This is div box</div>
</body>
</html>
