<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosition Properties Practice</title>
    <style>
        .box1{
            height: 100px;
            width: 200px;
            position: absolute;
            border: 2px solid black;
            background-color: red;
            z-index: 1;
            
        }

        .box2{
            height: 100px;
            width: 200px;
            position: absolute;
            border: 2px solid black;
            background-color: green;
            top: 40px;
            left: 40px;
            z-index: 2;
        }

        .box3{
            height: 100px;
            width: 200px;
            position: absolute;
            border: 2px solid black;
            background-color: blueviolet;
            top: 80px;
            left: 80px;
            z-index: 3;
            
        }
    </style>
</head>
<body>
    <div class="box1">I am in STATIC position rn</div>
    <div class="box2">I am in STATIC position rn</div>
    <div class="box3">I am in STATIC position rn</div>
</body>
</html>
