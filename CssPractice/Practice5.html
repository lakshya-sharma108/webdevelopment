<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-Model Practice</title>
    <style>
        .box1 {
            height: 950px;
            width: 95%;
            background-color:rgba(105, 90, 205, 0.516);
            border: 3px solid rgb(105, 90, 205);
            border-radius: 30px;
            margin: 30px 0px 0px 40px;
        }

        .box2 {
            height: 100px;
            width: 97%;
            background-color:rgba(255, 192, 203, 0.301);
            border: 3px solid rgba(255, 192, 203, 0.591);
            border-radius: 30px;
            margin: 20px 0px 0px 20px;

            text-align: center;
            line-height: 100px;
            font-size: 25px;
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
        }

        .box3 {
            height: 750px;
            width: 64%;
            background-color:rgba(144, 238, 144, 0.301);
            border: 3px solid rgba(144, 238, 144, 0.594);
            border-radius: 30px;
            margin: 20px 0px 0px 20px;

            text-align: center;
            line-height: 750px;
            font-size: 30px;
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
        }

        .box4 {
            height: 750px;
            width: 30%;
            background-color:rgba(135, 206, 250, 0.301);
            border: 3px solid rgba(135, 206, 250, 0.594);
            border-radius: 30px;
            margin: -755px 0px 0px 68%;

            text-align: center;
            line-height: 750px;
            font-size: 25px;
            font-weight: bold;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <div class="box1">
        <div class="box2">Header</div>
        <div class="box3">Main Content</div>
        <div class="box4">Side Navigation-Bar</div>
    </div>
</body>
</html>
