<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline or Block Element'</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <!-- 
    Block Element which capture full space
    here's the list of block elements
        <div> – Generic container
        <p> – Paragraph
        <h1> to <h6> – Headings
        <ul> – Unordered list
        <ol> – Ordered list
        <li> – List item
        <table> – Table
        <thead> – Table header
        <tbody> – Table body
        <tfoot> – Table footer
        <tr> – Table row
        <td> – Table cell (by default)
        <th> – Table header cell
        <form> – Form container
        <fieldset> – Group related form elements
        <legend> – Title for <fieldset>
        <section> – Section of a document
        <article> – Self-contained content
        <aside> – Sidebar content
        <nav> – Navigation links
        <header> – Header of a section
        <footer> – Footer of a section
        <main> – Main content of the document
        <figure> – Groups media content
        <figcaption> – Caption for <figure>
    -->

    <p>hello ji, kya haal chal</p>
    <div>hii, myself div and i am a block element</div>

    <!-- 
    Inline Elements which only capture requried space 
    Here's the list of inline elements
        <span> – Generic inline container
        <a> – Anchor (link)
        <b> – Bold text
        <strong> – Important text
        <i> – Italic text
        <em> – Emphasized text
        <u> – Underlined text
        <small> – Smaller text
        <mark> – Highlighted text
        <abbr> – Abbreviation
        <cite> – Citation
        <code> – Inline code
        <kbd> – Keyboard input
        <samp> – Sample output
        <var> – Variable in programming
        <sub> – Subscript
        <sup> – Superscript
        <time> – Date/time representation
        <label> – Label for form elements
        <input> – Form input (inline by default)
        <select> – Dropdown (inline by default)
        <textarea> – Multiline input (block in some browsers)
        <button> – Clickable button (inline-block)
        <img> – Image
        <br> – Line break
        <wbr> – Word break opportunity
        <q> – Short inline quotation
    -->

    <!-- 
        NOTE :- but we can change the inline element into block element 
                and block element into inline element
     -->
                
    <a href="https://google.com">Google</a>
    <span>hii, myself span and i am a inline element</span>
    
</body>
</html>
